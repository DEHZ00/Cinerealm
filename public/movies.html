<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Movies — CineRealm</title>
  <link rel="stylesheet" href="/style.css" />
  <link rel="stylesheet" href="/movies/movies.css" />
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#ff2c2c">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CineRealm">
  <link rel="icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://cinerealm.online/movies">
  <meta property="og:title" content="Movies — CineRealm">
  <meta property="og:description" content="Browse and filter movies on CineRealm.">
  <meta property="og:image" content="https://cinerealm.online/android-chrome-512x512.png">
</head>
<body>

<div id="appIntro" class="intro hidden">
  <div class="intro-logo"></div>
  <p class="intro-tagline">Stream Movies, TV &amp; Anime</p>
  <div class="intro-bar-wrap"><div class="intro-bar"></div></div>
</div>

<div id="site-notification"></div>

<header>
  <div class="header-left">
    <h1 style="cursor:pointer" onclick="location.href='/'">CineRealm</h1>
  </div>
  <input type="text" id="searchBar" placeholder="Search movies or shows..." autocomplete="off" />
  <nav class="nav-links">
    <a href="/" class="nav-btn">Home</a>
    <a href="/movies" class="nav-btn active">Movies</a>
    <a href="/trending" class="nav-btn">Trending</a>
    <a href="/genres" class="nav-btn">Genres</a>
    <a href="/anime" class="nav-btn">Anime</a>
    <a href="/watchlist" class="nav-btn">Watchlist</a>
    <a href="/games" class="nav-btn">Games</a>
    <a href="/stats" class="nav-btn">Stats</a>
    <a href="/legal" class="nav-btn">Legal</a>
    <a href="/donate" class="nav-btn" style="color:rgba(255,150,150,0.7);">♥</a>
  </nav>
</header>

<main class="mv-main">

  <div class="mv-header">
    <div>
      <h2 class="mv-title">🎬 Movies</h2>
      <span id="moviesMeta" class="mv-meta">Loading…</span>
    </div>
  </div>

  <!-- Filter bar -->
  <div class="mv-filterbar">
    <div class="mv-filter-block">
      <label class="mv-label">Sort</label>
      <select id="moviesSort" class="mv-select">
        <option value="popularity.desc">🔥 Most Popular</option>
        <option value="vote_average.desc">⭐ Top Rated</option>
        <option value="primary_release_date.desc">🆕 Newest</option>
        <option value="primary_release_date.asc">📅 Oldest</option>
        <option value="revenue.desc">💰 Highest Grossing</option>
      </select>
    </div>

    <div class="mv-filter-block">
      <label class="mv-label">Year range</label>
      <div class="mv-yearwrap">
        <input id="yearFrom" class="mv-yearinput" type="number" min="1900" max="2100" value="2000" placeholder="From">
        <span class="mv-yearsep">–</span>
        <input id="yearTo" class="mv-yearinput" type="number" min="1900" max="2100" value="2025" placeholder="To">
      </div>
    </div>

    <div class="mv-filter-block mv-filter-actions">
      <label class="mv-label">&nbsp;</label>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <button id="toggleGenres" class="mv-btn mv-btn-ghost">🎭 Genres <span id="genreCountBadge" class="mv-count" style="display:none">0</span></button>
        <button id="applyMoviesFilters" class="mv-btn mv-btn-primary">Apply</button>
        <button id="clearMoviesFilters" class="mv-btn mv-btn-clear">✕ Clear</button>
      </div>
    </div>
  </div>

  <!-- Genre chips -->
  <div id="genresPanel" class="mv-genres-panel" style="display:none;"></div>

  <!-- Grid -->
  <div id="moviesResults" class="mv-grid"></div>

  <!-- Loading spinner shown when fetching next page -->
  <div id="mvSpinner" class="mv-loading-row" style="display:none;">
    <div class="mv-spinner"></div>
    <span style="color:rgba(255,255,255,0.4);font-size:13px;">Loading more…</span>
  </div>

</main>

<div id="detailsOverlay" class="details-overlay" onclick="closeDetailsPanel()"></div>
<div id="detailsPanel" class="details-panel" style="display:none;">
  <button class="details-panel-close" onclick="closeDetailsPanel()">✕</button>
  <div id="detailsPanelBody" class="details-panel-body"></div>
</div>
<div id="detailsModal" class="modal" style="display:none;">
  <div class="modal-content">
    <span class="close-btn">&times;</span>
    <div id="detailsBody"></div>
  </div>
</div>

<script src="/cloak-config.js"></script>
<script src="/script.js"></script>
<script src="/movies/movies.js"></script>
<script>
// Force movie card clicks to work on movies page
document.addEventListener("click", function(e) {
  const card = e.target.closest(".movie-card");
  if (!card || !card._movieData) return;
  e.stopImmediatePropagation();
  showMovieDetails(card._movieData, card._mediaType || "movie");
}, true);
</script>

<script>window.va=window.va||function(){(window.vaq=window.vaq||[]).push(arguments);};</script>
<script defer src="/_vercel/insights/script.js"></script>
<script>window.si=window.si||function(){(window.siq=window.siq||[]).push(arguments);};</script>
<script defer src="/_vercel/speed-insights/script.js"></script>
</body>
</html>
