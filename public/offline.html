<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline — CineRealm</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #3b0000, #5a0000, #8a0000);
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .logo { font-size: 32px; font-weight: 800; color: #ff2c2c; margin-bottom: 24px; }
    .icon { font-size: 64px; margin-bottom: 16px; }
    h1 { font-size: 24px; margin-bottom: 10px; }
    p { color: rgba(255,255,255,0.6); font-size: 15px; line-height: 1.6; max-width: 360px; margin-bottom: 28px; }
    .retry-btn {
      padding: 12px 32px;
      background: #ff2c2c;
      color: #fff;
      border: none;
      border-radius: 999px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }
    .retry-btn:hover { background: #e01f1f; }
  </style>
</head>
<body>
  <div class="logo">🎬 CineRealm</div>
  <div class="icon">📡</div>
  <h1>You're Offline</h1>
  <p>No internet connection detected. Check your connection and try again — your watchlist and recently viewed posters may still be available.</p>
  <button class="retry-btn" onclick="window.location.reload()">Try Again</button>
</body>
</html>
