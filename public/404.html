<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — CineRealm</title>
  <link rel="icon" href="/favicon.ico">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0a0000;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      overflow: hidden;
    }

    /* Ambient background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 50% at 50% -5%, rgba(78,0,0,0.7) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 80% 110%, rgba(78,0,0,0.3) 0%, transparent 55%);
      pointer-events: none;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 520px;
      animation: fadeUp 0.6s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo {
      font-size: 24px;
      font-weight: 800;
      color: #ff2c2c;
      margin-bottom: 48px;
      letter-spacing: 0.5px;
      text-shadow: 0 0 30px rgba(255,44,44,0.3);
    }

    .error-code {
      font-size: clamp(80px, 20vw, 140px);
      font-weight: 900;
      line-height: 1;
      background: linear-gradient(135deg, #ff2c2c, #ff6b6b, #4E0000);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
      letter-spacing: -4px;
    }

    .film-strip {
      font-size: 28px;
      margin-bottom: 24px;
      opacity: 0.6;
      letter-spacing: 4px;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 12px;
      color: #fff;
    }

    p {
      font-size: 15px;
      color: rgba(255,255,255,0.5);
      line-height: 1.6;
      margin-bottom: 36px;
    }

    .btn-group {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn-primary {
      padding: 12px 28px;
      background: #ff2c2c;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      border-radius: 999px;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 6px 20px rgba(255,44,44,0.3);
    }
    .btn-primary:hover {
      background: #e01f1f;
      transform: translateY(-1px);
      box-shadow: 0 10px 28px rgba(255,44,44,0.4);
    }

    .btn-secondary {
      padding: 12px 28px;
      background: rgba(255,255,255,0.07);
      color: rgba(255,255,255,0.8);
      font-size: 14px;
      font-weight: 600;
      border-radius: 999px;
      text-decoration: none;
      border: 1.5px solid rgba(255,255,255,0.12);
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }
    .btn-secondary:hover {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.25);
    }

    .suggestions {
      margin-top: 48px;
      padding-top: 32px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    .suggestions p {
      font-size: 13px;
      color: rgba(255,255,255,0.3);
      margin-bottom: 14px;
    }

    .suggestion-links {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .suggestion-links a {
      padding: 6px 14px;
      background: rgba(255,44,44,0.08);
      border: 1px solid rgba(255,44,44,0.2);
      color: #ff6b6b;
      font-size: 12px;
      font-weight: 600;
      border-radius: 999px;
      text-decoration: none;
      transition: background 0.15s;
    }
    .suggestion-links a:hover { background: rgba(255,44,44,0.16); }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">🎬 CineRealm</div>
    <div class="error-code">404</div>
    <div class="film-strip">🎞️ 🎬 🎞️</div>
    <h1>Scene Not Found</h1>
    <p>The page you're looking for doesn't exist or may have been moved.<br>Let's get you back to something worth watching.</p>
    <div class="btn-group">
      <a href="/" class="btn-primary">🏠 Back to Home</a>
      <a href="javascript:history.back()" class="btn-secondary">← Go Back</a>
    </div>
    <div class="suggestions">
      <p>Or browse directly</p>
      <div class="suggestion-links">
        <a href="/movies">Movies</a>
        <a href="/trending">Trending</a>
        <a href="/genres">Genres</a>
        <a href="/watchlist">Watchlist</a>
        <a href="/search">Search</a>
      </div>
    </div>
  </div>
</body>
</html>
