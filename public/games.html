<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Games – CineRealm</title>
  <meta name="description" content="Play unblocked games on CineRealm." />
  <link rel="stylesheet" href="/style.css" />
  <link rel="icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <meta property="og:title" content="CineRealm Games">
  <meta property="og:description" content="Play unblocked games on CineRealm.">
  <meta property="og:image" content="https://cinerealm.online/android-chrome-512x512.png">
  <link href="https://cdn.jsdelivr.net/npm/gn-math.github.io-main@1.0.5/style.min.css" rel="stylesheet">
  <style>
    .games-page { width: 100%; min-height: calc(100vh - 62px); padding: 0; }
    #gnmath-container { width: 100%; min-height: calc(100vh - 62px); }
    .games-loading {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 16px; padding: 80px 24px; text-align: center;
    }
    .games-loading-spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(255,44,44,0.2); border-top-color: #ff2c2c;
      border-radius: 50%; animation: gspin 0.8s linear infinite;
    }
    @keyframes gspin { to { transform: rotate(360deg); } }
    .games-loading p { color: rgba(255,255,255,0.5); font-size: 14px; font-weight: 500; }
    .games-fallback { display: none; flex-direction: column; align-items: center; justify-content: center; gap: 14px; padding: 80px 24px; text-align: center; }
    .games-fallback.visible { display: flex; }
    .games-fallback h3 { font-size: 20px; font-weight: 700; color: #fff; margin: 0; }
    .games-fallback p { color: rgba(255,255,255,0.5); font-size: 14px; max-width: 400px; line-height: 1.6; margin: 0; }
    .games-fallback-btn { padding: 10px 24px; background: #ff2c2c; color: #fff; border: none; border-radius: 999px; font-size: 14px; font-weight: 700; cursor: pointer; transition: background 0.2s; text-decoration: none; display: inline-block; }
    .games-fallback-btn:hover { background: #e01f1f; }
    .games-fallback-btn.secondary { background: rgba(255,255,255,0.1); margin-top: 6px; }
  </style>
</head>
<body>

<div id="appIntro" class="intro hidden"><div class="intro-logo">CineRealm</div></div>
<div id="site-notification"></div>

<header>
  <div class="header-left">
    <h1><a href="/" style="color:#ff2c2c;text-decoration:none;">🎬 Cine Realm</a></h1>
  </div>
  <input type="text" id="searchBar" placeholder="Search movies or shows..." autocomplete="off">
  <nav class="nav-links">
    <a href="/" class="nav-btn">Home</a>
    <a href="/movies" class="nav-btn">Movies</a>
    <a href="/trending" class="nav-btn">Trending</a>
    <a href="/genres" class="nav-btn">Genres</a>
    <a href="/watchlist" class="nav-btn">Watchlist</a>
    <a href="/games" class="nav-btn active">Games</a>
    <a href="/legal" class="nav-btn">Legal</a>
  </nav>
</header>

<main class="games-page">
  <div class="games-loading" id="gamesLoading">
    <div class="games-loading-spinner"></div>
    <p>Loading games…</p>
  </div>
  <div class="games-fallback" id="gamesFallback">
    <h3>🎮 Games unavailable</h3>
    <p>The games launcher couldn't load. You can visit the games site directly or try refreshing.</p>
    <a href="https://gn-math.github.io" target="_blank" rel="noopener" class="games-fallback-btn">Open Games Site</a>
    <button class="games-fallback-btn secondary" onclick="location.reload()">Refresh</button>
  </div>
  <div id="gnmath-container"></div>
</main>

<div id="detailsModal" class="modal" style="display:none;">
  <div class="modal-content"><span class="close-btn">&times;</span><div id="detailsBody"></div></div>
</div>

<script src="/script.js" defer></script>
<script>
(function() {
  const loading   = document.getElementById("gamesLoading");
  const fallback  = document.getElementById("gamesFallback");
  const container = document.getElementById("gnmath-container");

  const timeout = setTimeout(() => {
    loading.style.display = "none";
    fallback.classList.add("visible");
  }, 10000);

  const s = document.createElement("script");
  s.src = "https://cdn.jsdelivr.net/npm/gn-math.github.io-main@1.0.5/gnmath.min.js";
  s.async = true;
  s.onload = () => {
    clearTimeout(timeout);
    loading.style.display = "none";
    setTimeout(() => {
      if (!container.children.length) fallback.classList.add("visible");
    }, 2000);
  };
  s.onerror = () => {
    clearTimeout(timeout);
    loading.style.display = "none";
    fallback.classList.add("visible");
  };
  document.body.appendChild(s);
})();
</script>

<script>window.va = window.va || function(){(window.vaq=window.vaq||[]).push(arguments);};</script>
<script defer src="/_vercel/insights/script.js"></script>
<script>window.si = window.si || function(){(window.siq=window.siq||[]).push(arguments);};</script>
<script defer src="/_vercel/speed-insights/script.js"></script>
<script src="https://uptime.betterstack.com/widgets/announcement.js" data-id="240420" async type="text/javascript"></script>
</body>
</html>
