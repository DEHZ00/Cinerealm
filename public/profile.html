<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile — CineRealm</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="icon" href="/favicon.ico">
  <meta property="og:title" content="CineRealm Profile">
  <meta property="og:image" content="https://cinerealm.online/android-chrome-512x512.png">
</head>
<body>

<div id="site-notification"></div>

<header>
  <div class="header-left">
    <h1><a href="/" style="color:#ff2c2c;text-decoration:none;">CineRealm</a></h1>
  </div>
  <input type="text" id="searchBar" placeholder="Search movies or shows..." autocomplete="off">
  <nav class="nav-links">
    <a href="/" class="nav-btn">Home</a>
    <a href="/movies" class="nav-btn">Movies</a>
    <a href="/trending" class="nav-btn">Trending</a>
    <a href="/genres" class="nav-btn">Genres</a>
    <a href="/anime" class="nav-btn">Anime</a>
    <a href="/watchlist" class="nav-btn">Watchlist</a>
    <a href="/games" class="nav-btn">Games</a>
    <a href="/stats" class="nav-btn">Stats</a>
    <a href="/legal" class="nav-btn">Legal</a>
    <a href="/donate" class="nav-btn" style="color:rgba(255,150,150,0.7);">♥</a>
  </nav>
</header>

<main>
  <div class="cr-profile-page" id="profilePageContent">
    <div style="text-align:center;padding:60px;color:rgba(255,255,255,0.3);">
      <div class="games-loading-spinner" style="margin:0 auto 16px;"></div>
      Loading profile…
    </div>
  </div>
</main>

<div id="detailsOverlay" class="details-overlay" onclick="closeDetailsPanel()"></div>
<div id="detailsPanel" class="details-panel" style="display:none;">
  <button class="details-panel-close" onclick="closeDetailsPanel()">✕</button>
  <div id="detailsPanelBody" class="details-panel-body"></div>
</div>

<nav class="mobile-bottom-nav">
  <a href="/" class="mobile-nav-item"><span class="mobile-nav-icon">🏠</span><span class="mobile-nav-label">Home</span></a>
  <a href="/search" class="mobile-nav-item"><span class="mobile-nav-icon">🔍</span><span class="mobile-nav-label">Search</span></a>
  <a href="/anime" class="mobile-nav-item"><span class="mobile-nav-icon">⛩️</span><span class="mobile-nav-label">Anime</span></a>
  <a href="/watchlist" class="mobile-nav-item"><span class="mobile-nav-icon">★</span><span class="mobile-nav-label">Watchlist</span></a>
  <a href="/stats" class="mobile-nav-item"><span class="mobile-nav-icon">📊</span><span class="mobile-nav-label">Stats</span></a>
</nav>

<script src="/cloak-config.js"></script>
<script src="/script.js"></script>
<script>
(async function loadProfilePage() {
  const username = window.location.pathname.split("/user/")[1]?.split("/")[0];
  const container = document.getElementById("profilePageContent");
  if (!username) {
    container.innerHTML = `<div style="text-align:center;padding:60px;color:rgba(255,255,255,0.3);">Invalid profile URL</div>`;
    return;
  }

  try {
    const { getDatabase, ref, get } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js");
    const { initializeApp, getApps } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js");
    const app = getApps().length ? getApps()[0] : initializeApp({
      apiKey: "AIzaSyAIRrBzdN6Rvndo5G4w6ILTa9xoJ_95VrM",
      authDomain: "cinerealm-8b7b9.firebaseapp.com",
      databaseURL: "https://cinerealm-8b7b9-default-rtdb.firebaseio.com",
      projectId: "cinerealm-8b7b9",
    });
    const db = getDatabase(app);

    // Get UID from username
    const uidSnap = await get(ref(db, "usernames/" + username));
    if (!uidSnap.exists()) {
      container.innerHTML = `<div style="text-align:center;padding:60px;"><div style="font-size:48px;margin-bottom:16px;">👤</div><div style="font-size:18px;font-weight:800;color:rgba(255,255,255,0.5);">User not found</div><p style="color:rgba(255,255,255,0.3);">@${username} doesn't exist</p></div>`;
      return;
    }

    const uid = uidSnap.val();
    const [profileSnap, achSnap, historySnap] = await Promise.all([
      get(ref(db, "users/" + uid + "/profile")),
      get(ref(db, "users/" + uid + "/achievements")),
      get(ref(db, "users/" + uid + "/history")),
    ]);

    const profile = profileSnap.val();
    const achievements = achSnap.exists() ? achSnap.val() : {};
    const historyCount = historySnap.exists() ? Object.keys(historySnap.val()).length : 0;

    if (!profile) {
      container.innerHTML = `<div style="text-align:center;padding:60px;color:rgba(255,255,255,0.3);">Profile not available</div>`;
      return;
    }

    document.title = `${profile.displayName || profile.username} — CineRealm`;

    const avatar = profile.avatarUrl || "";
    const initial = (profile.displayName || profile.username || "?")[0].toUpperCase();
    const isOwnProfile = typeof _crUser !== "undefined" && _crUser?.uid === uid;

    // Check if current user follows this profile
    let following = false;
    if (typeof isFollowing === "function" && !isOwnProfile) {
      following = await isFollowing(uid);
    }

    // Build achievement badges
    const ACHIEVEMENT_LIST = typeof ACHIEVEMENTS !== "undefined" ? ACHIEVEMENTS : [];
    const achHTML = ACHIEVEMENT_LIST.map(a => {
      const earned = achievements[a.id];
      return `
        <div class="cr-achievement-badge ${earned ? "" : "locked"}" title="${a.desc}${earned ? "\nEarned: "+new Date(earned.earnedAt).toLocaleDateString() : ""}">
          ${a.icon} ${a.name}
        </div>`;
    }).join("");

    container.innerHTML = `
      <!-- Hero -->
      <div class="cr-profile-hero">
        <div class="cr-profile-avatar-lg">
          ${avatar ? `<img src="${avatar}" style="width:100%;height:100%;object-fit:cover;">` : initial}
        </div>
        <div style="flex:1;min-width:0;">
          <div class="cr-profile-name">${profile.displayName || profile.username}</div>
          <div class="cr-profile-username">@${profile.username}</div>
          ${profile.bio ? `<p class="cr-profile-bio">${profile.bio}</p>` : ""}
          <div class="cr-profile-stats">
            <div class="cr-profile-stat">
              <div class="cr-profile-stat-val">${historyCount}</div>
              <div class="cr-profile-stat-label">Watched</div>
            </div>
            <div class="cr-profile-stat">
              <div class="cr-profile-stat-val">${profile.followers || 0}</div>
              <div class="cr-profile-stat-label">Followers</div>
            </div>
            <div class="cr-profile-stat">
              <div class="cr-profile-stat-val">${profile.following || 0}</div>
              <div class="cr-profile-stat-label">Following</div>
            </div>
            <div class="cr-profile-stat">
              <div class="cr-profile-stat-val">${Object.keys(achievements).length}</div>
              <div class="cr-profile-stat-label">Badges</div>
            </div>
          </div>
        </div>
        <div style="display:flex;flex-direction:column;gap:8px;align-items:flex-end;flex-shrink:0;">
          ${isOwnProfile
            ? `<button class="cr-follow-btn unfollow" onclick="openEditProfileModal()">✏ Edit Profile</button>`
            : `<button id="followBtn" class="cr-follow-btn ${following ? "unfollow" : "follow"}" onclick="handleFollowClick('${uid}')">
                ${following ? "Following" : "Follow"}
               </button>`
          }
          ${isOwnProfile ? `<a href="/stats" class="cr-follow-btn unfollow" style="text-decoration:none;text-align:center;">📊 My Stats</a>` : ""}
        </div>
      </div>

      <!-- Achievements -->
      ${achHTML ? `
        <div style="margin-bottom:24px;">
          <div class="panel-section-title">Achievements</div>
          <div class="cr-achievements-grid">${achHTML}</div>
        </div>
      ` : ""}

      <!-- Member since -->
      <div style="font-size:12px;color:rgba(255,255,255,0.25);margin-top:16px;">
        Member since ${new Date(profile.createdAt).toLocaleDateString("en-US",{month:"long",year:"numeric"})}
      </div>
    `;

    window.handleFollowClick = async function(targetUid) {
      const btn = document.getElementById("followBtn");
      if (!btn) return;
      if (following) {
        await unfollowUser(targetUid);
        following = false;
        btn.textContent = "Follow";
        btn.className = "cr-follow-btn follow";
      } else {
        await followUser(targetUid);
        following = true;
        btn.textContent = "Following";
        btn.className = "cr-follow-btn unfollow";
      }
    };

  } catch(e) {
    container.innerHTML = `<div style="text-align:center;padding:60px;color:rgba(255,255,255,0.3);">Failed to load profile</div>`;
    console.error(e);
  }
})();
</script>

<script>window.si=window.si||function(){(window.siq=window.siq||[]).push(arguments);};</script>
<script defer src="/_vercel/speed-insights/script.js"></script>
</body>
</html>
