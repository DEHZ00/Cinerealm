<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Movies — CineRealm</title>
  <link rel="stylesheet" href="/style.css" />
  <link rel="stylesheet" href="/movies/movies.css" />
    <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#ff2c2c">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CineRealm">
<link rel="icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://cinerealm.online/movies">
  <meta property="og:title" content="Movies — CineRealm">
  <meta property="og:description" content="Browse and filter movies on CineRealm.">
  <meta property="og:image" content="https://cinerealm.online/android-chrome-512x512.png">
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:image" content="https://cinerealm.online/android-chrome-512x512.png">
  <style>
    /* Vertical grid for movies browse page */
    #moviesResults {
      display: grid !important;
      grid-template-columns: repeat(auto-fill, minmax(148px, 1fr));
      gap: 16px;
      overflow-x: unset !important;
      padding-bottom: 20px;
      flex-wrap: unset;
    }

    #moviesResults .movie-card {
      min-width: unset !important;
      max-width: unset !important;
      width: 100%;
    }
  </style>
</head>
<body>

<div id="appIntro" class="intro hidden">
  <div class="intro-logo"></div>
  <p class="intro-tagline">Stream Movies, TV &amp; Anime</p>
  <div class="intro-bar-wrap"><div class="intro-bar"></div></div>
</div>
  <p class="intro-tagline">Stream Movies, TV &amp; Anime</p>
  <div class="intro-bar-wrap"><div class="intro-bar"></div></div>
</div>
<div id="site-notification"></div>

<header>
  <div class="header-left">
    <h1 style="cursor:pointer" onclick="location.href='/'">CineRealm</h1>
  </div>
  <input type="text" id="searchBar" placeholder="Search movies or shows..." autocomplete="off" />
    <nav class="nav-links">
    <a href="/" class="nav-btn">Home</a>
    <a href="/movies" class="nav-btn active">Movies</a>
    <a href="/trending" class="nav-btn">Trending</a>
    <a href="/genres" class="nav-btn">Genres</a>
    <a href="/anime" class="nav-btn">Anime</a>
    <a href="/watchlist" class="nav-btn">Watchlist</a>
    <a href="/games" class="nav-btn">Games</a>
    <a href="/stats" class="nav-btn">Stats</a>
    <a href="/legal" class="nav-btn">Legal</a>
  </nav>
</header>

<section>
  <h2><span class="section-title-text">Movies</span></h2>

  <div class="movies-filterbar">
    <select id="moviesSort" class="movies-filter">
      <option value="popularity.desc">Popularity</option>
      <option value="vote_average.desc">Rating</option>
      <option value="primary_release_date.desc">Release Date</option>
    </select>

    <div class="movies-filter">
      <input id="yearFrom" type="number" min="1900" max="2100" value="2000" />
      <span style="opacity:.7;">to</span>
      <input id="yearTo" type="number" min="1900" max="2100" value="2025" />
    </div>

    <button id="toggleGenres" class="nav-btn">Genres</button>
    <button id="applyMoviesFilters" class="nav-btn">Apply</button>
    <button id="clearMoviesFilters" class="nav-btn">Clear</button>
  </div>

  <div id="genresPanel" class="genres-panel" style="display:none;"></div>
  <div id="moviesMeta" class="movies-meta">Showing 0 of 0 results</div>
  <div id="moviesResults"></div>

  <div class="movies-pager">
    <button id="firstBtn" class="nav-btn">First</button>
    <button id="prevBtn" class="nav-btn">‹</button>
    <div id="pageBtns" class="page-btns"></div>
    <button id="nextBtn" class="nav-btn">›</button>
    <button id="lastBtn" class="nav-btn">Last</button>
  </div>
</section>

<!-- Details Side Panel -->
<div id="detailsOverlay" class="details-overlay" onclick="closeDetailsPanel()"></div>
<div id="detailsPanel" class="details-panel" style="display:none;">
  <button class="details-panel-close" onclick="closeDetailsPanel()">✕</button>
  <div id="detailsPanelBody" class="details-panel-body"></div>
</div>

<!-- Details Modal (legacy fallback) -->
<div id="detailsModal" class="modal" style="display:none;">
  <div class="modal-content">
    <span class="close-btn">&times;</span>
    <div id="detailsBody"></div>
  </div>
</div>

<!-- Disclaimer Modal -->
<div id="disclaimerModal" class="modal" style="display:none;">
  <div class="modal-content">
    <h2>Before You Watch</h2>
    <p>Some third-party sources may show pop-ups or ads outside of our control.</p>
    <label style="display:flex;align-items:center;gap:8px;margin:12px 0;">
      <input type="checkbox" id="dontShowAgain">
      <span>Don't show this again on this device</span>
    </label>
    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:10px;">
      <button id="cancelDisclaimer" class="nav-btn" type="button">Cancel</button>
      <button id="acceptDisclaimer" class="nav-btn" type="button">I Understand</button>
    </div>
  </div>
</div>

<script src="/cloak-config.js"></script>
<script src="/script.js" defer></script>
<script src="/movies/movies.js" defer></script>

<!-- Vercel Analytics -->
<script>window.va = window.va || function(){(window.vaq=window.vaq||[]).push(arguments);};</script>
<script defer src="/_vercel/insights/script.js"></script>
<script>window.si = window.si || function(){(window.siq=window.siq||[]).push(arguments);};</script>
<script defer src="/_vercel/speed-insights/script.js"></script>

<script>
async function loadNotification() {
  try {
    const res = await fetch("/notification.json?cache=" + Date.now());
    const data = await res.json();
    if (!data.active) return;
    const container = document.getElementById("site-notification");
    container.innerHTML = `
      <div class="notification-banner ${data.type}">
        <div class="notification-content">
          <strong>${data.title}</strong>
          <span>${data.message}</span>
          ${data.updated ? `<small class="notification-time">Updated: ${data.updated}</small>` : ""}
          <button onclick="this.parentElement.parentElement.remove()">✕</button>
        </div>
      </div>
    `;
  } catch (err) { console.error("Notification load failed", err); }
}
loadNotification();
setInterval(loadNotification, 30000);
</script>

<script src="https://uptime.betterstack.com/widgets/announcement.js" data-id="240420" async type="text/javascript"></script>
<iframe src="https://status.cinerealm.online/badge?theme=dark" width="250" height="30" frameborder="0" scrolling="no" style="color-scheme:normal"></iframe>

</body>
</html>
