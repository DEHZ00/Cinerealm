<script>
// ── AniList GraphQL API ───────────────────────────────────────────────────

async function anilistQuery(query, variables = {}) {
  const body = JSON.stringify({ query, variables });

  // Try proxy first, fall back to direct if proxy fails
  const endpoints = ["/api/anilist", "https://graphql.anilist.co"];

  for (const endpoint of endpoints) {
    try {
      const res = await fetch(endpoint, {
        method: "POST",
        headers: { "Content-Type": "application/json", "Accept": "application/json" },
        body
      });
      if (!res.ok) continue;
      const json = await res.json();
      if (json.data) return json.data;
    } catch(e) {
      console.warn("AniList endpoint failed:", endpoint, e.message);
    }
  }
  return null;
}

// ── Dub/Sub state ─────────────────────────────────────────────────────────
let animeDubMode = localStorage.getItem("cr_anime_dub") === "dub" ? "dub" : "sub";
function setDubSub(mode) {
  animeDubMode = mode;
  localStorage.setItem("cr_anime_dub", mode);
  document.getElementById("subBtn").classList.toggle("active", mode === "sub");
  document.getElementById("dubBtn").classList.toggle("active", mode === "dub");
}
setDubSub(animeDubMode);

// ── Season label ──────────────────────────────────────────────────────────
function getSeasonInfo() {
  const now = new Date();
  const month = now.getMonth() + 1;
  const year = now.getFullYear();
  if (month >= 1  && month <= 3)  return { season: "WINTER", label: "Winter", year };
  if (month >= 4  && month <= 6)  return { season: "SPRING", label: "Spring", year };
  if (month >= 7  && month <= 9)  return { season: "SUMMER", label: "Summer", year };
  return { season: "FALL", label: "Fall", year };
}

const seasonInfo = getSeasonInfo();
document.getElementById("seasonTitle").textContent = `${seasonInfo.label} ${seasonInfo.year} Anime`;
document.getElementById("seasonSub").textContent = `Currently airing this ${seasonInfo.label.toLowerCase()}`;

// ── Genre filter ──────────────────────────────────────────────────────────
let activeAnimeGenre = "";
document.querySelectorAll(".anime-genre-chip").forEach(chip => {
  chip.onclick = () => {
    document.querySelectorAll(".anime-genre-chip").forEach(c => c.classList.remove("active"));
    chip.classList.add("active");
    activeAnimeGenre = chip.dataset.genre;
    loadAnimeRows();
  };
});

// ── AniList card creation ─────────────────────────────────────────────────
function createAniListCard(anime) {
  const card = document.createElement("div");
  card.className = "movie-card";
  card.style.cursor = "pointer";

  const title = anime.title?.english || anime.title?.romaji || anime.title?.native || "Unknown";
  const cover  = anime.coverImage?.large || anime.coverImage?.medium || "";
  const score  = anime.averageScore ? (anime.averageScore / 10).toFixed(1) : null;
  const eps    = anime.episodes ? `${anime.episodes} eps` : (anime.status === "RELEASING" ? "Ongoing" : "");

  card.innerHTML = `
    <div class="card-image-wrapper" style="position:relative;">
      <img src="${cover}" alt="${title}" loading="lazy" style="width:100%;display:block;aspect-ratio:2/3;object-fit:cover;">
      <div class="card-type-badge">Anime</div>
      ${score ? `<div class="anime-card-score">★ ${score}</div>` : ""}
      ${eps    ? `<div class="anime-card-episodes">${eps}</div>` : ""}
    </div>
    <p style="padding:8px 6px;font-size:12px;font-weight:600;color:#fff;text-align:center;
              white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${title}</p>
  `;

  card.onclick = () => openAnimeDetails(anime);
  return card;
}

// ── Open anime details ────────────────────────────────────────────────────
async function openAnimeDetails(anime) {
  const title = anime.title?.english || anime.title?.romaji || "Unknown";

  // Try to find TMDB match to use existing details panel
  // Search TMDB by title
  try {
    const data = await apiCall("/search/tv", { query: anime.title?.romaji || title, page: 1 });
    if (data?.results?.length) {
      // Find best match — prefer Japanese original language
      const match = data.results.find(r => r.original_language === "ja") || data.results[0];
      if (match) {
        // Store anilist ID for source routing
        match._anilistId = anime.id;
        match._isDub = animeDubMode === "dub";
        showMovieDetails(match, "tv");
        return;
      }
    }
  } catch(e) {}

  // Fallback — show basic info and direct watch link
  if (typeof showToast === "function") showToast("Opening " + title, "info");
  window.location.href = `/watch/tv/${anime.id}/season/1/episode/1`;
}

// ── Row definitions ───────────────────────────────────────────────────────
const ANILIST_QUERY = `
query ($page: Int, $perPage: Int, $sort: [MediaSort], $season: MediaSeason, $seasonYear: Int, $genre: String, $status: MediaStatus) {
  Page(page: $page, perPage: $perPage) {
    media(type: ANIME, sort: $sort, season: $season, seasonYear: $seasonYear, genre: $genre, status: $status, isAdult: false) {
      id
      title { romaji english native }
      coverImage { large medium }
      averageScore
      episodes
      status
      genres
      description(asHtml: false)
      seasonYear
      season
      popularity
    }
  }
}`;

function getAnimeRows() {
  const genre = activeAnimeGenre || undefined;
  return [
    {
      title: `${seasonInfo.label} ${seasonInfo.year}`,
      vars: { sort: ["POPULARITY_DESC"], season: seasonInfo.season, seasonYear: seasonInfo.year, genre, perPage: 20, page: 1 }
    },
    {
      title: "Trending Now",
      vars: { sort: ["TRENDING_DESC"], genre, perPage: 20, page: 1 }
    },
    {
      title: "All Time Popular",
      vars: { sort: ["POPULARITY_DESC"], genre, perPage: 20, page: 1 }
    },
    {
      title: "Top Rated",
      vars: { sort: ["SCORE_DESC"], genre, perPage: 20, page: 1 }
    },
    {
      title: "Currently Airing",
      vars: { sort: ["POPULARITY_DESC"], status: "RELEASING", genre, perPage: 20, page: 1 }
    },
    {
      title: "Recently Finished",
      vars: { sort: ["END_DATE_DESC"], status: "FINISHED", genre, perPage: 20, page: 1 }
    },
  ];
}

// ── Load all rows ─────────────────────────────────────────────────────────
async function loadAnimeRows() {
  const container = document.getElementById("animeRows");
  container.innerHTML = "";

  const rows = getAnimeRows();

  // Build skeleton rows
  rows.forEach((row, i) => {
    const section = document.createElement("section");
    section.innerHTML = `
      <div class="section-header">
        <h2>${row.title}</h2>
      </div>
      <div class="movie-row-wrapper">
        <div class="movie-row" id="animeRow_${i}"></div>
      </div>
    `;
    container.appendChild(section);
    showSkeletons("animeRow_" + i, 10);
  });

  // Fetch all in parallel
  await Promise.all(rows.map(async (row, i) => {
    try {
      const data = await anilistQuery(ANILIST_QUERY, row.vars);
      const rowEl = document.getElementById("animeRow_" + i);
      if (!rowEl) return;
      rowEl.innerHTML = "";

      const results = data?.Page?.media || [];
      if (!results.length) {
        rowEl.innerHTML = '<p style="color:rgba(255,255,255,0.3);font-size:13px;padding:10px;">No results</p>';
        return;
      }

      results.forEach(anime => {
        const card = createAniListCard(anime);
        rowEl.appendChild(card);
      });

      addRowScrollArrows(rowEl.parentElement);
    } catch(e) {
      console.warn("Row failed:", row.title, e);
    }
  }));
}

// ── Search integration ────────────────────────────────────────────────────
// Override search bar on this page to search AniList
const searchBar = document.getElementById("searchBar");
if (searchBar) {
  let searchTimeout;
  searchBar.addEventListener("input", () => {
    clearTimeout(searchTimeout);
    const q = searchBar.value.trim();
    if (!q) { loadAnimeRows(); return; }
    searchTimeout = setTimeout(() => searchAnime(q), 400);
  });
  searchBar.addEventListener("keydown", e => {
    if (e.key === "Enter") {
      clearTimeout(searchTimeout);
      const q = searchBar.value.trim();
      if (q) searchAnime(q);
    }
  });
}

async function searchAnime(query) {
  const container = document.getElementById("animeRows");
  container.innerHTML = `<section><div class="section-header"><h2>Results for "${query}"</h2></div><div class="movie-row-wrapper"><div class="movie-row" id="animeSearchRow"></div></div></section>`;
  showSkeletons("animeSearchRow", 10);

  const SEARCH_QUERY = `
  query ($search: String, $page: Int, $perPage: Int) {
    Page(page: $page, perPage: $perPage) {
      media(type: ANIME, search: $search, isAdult: false, sort: [SEARCH_MATCH]) {
        id
        title { romaji english native }
        coverImage { large medium }
        averageScore
        episodes
        status
        genres
      }
    }
  }`;

  const data = await anilistQuery(SEARCH_QUERY, { search: query, page: 1, perPage: 20 });
  const rowEl = document.getElementById("animeSearchRow");
  if (!rowEl) return;
  rowEl.innerHTML = "";

  const results = data?.Page?.media || [];
  if (!results.length) {
    rowEl.innerHTML = '<p style="color:rgba(255,255,255,0.3);font-size:13px;padding:10px;">No anime found</p>';
    return;
  }
  results.forEach(anime => rowEl.appendChild(createAniListCard(anime)));
  addRowScrollArrows(rowEl.parentElement);
}

// Init
window.addEventListener("load", loadAnimeRows);
</script>

<script>
(function() {
  const tagline = document.getElementById("animeTagline");
  if (!tagline) return;

  // ── Extend splash duration for anime page ──────────────────────────────
  // Override the default 1600ms — anime animation needs ~4.5s
  const introEl = document.getElementById("appIntro");
  if (introEl) {
    // Cancel any existing hide timer by removing fade-out immediately if added
    const ANIME_SPLASH_DURATION = 4800;
    // Re-schedule the splash hide
    setTimeout(() => {
      introEl.classList.add("fade-out");
      setTimeout(() => { introEl.style.display = "none"; }, 800);
    }, ANIME_SPLASH_DURATION);
  }

  const japaneseChars = "アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモ";
  const finalText     = "Watch Anime ⛩️";

  // ── Glitch reveal into final text ─────────────────────────────────────
  function glitchReveal() {
    let frame = 0;
    const totalFrames = 36;    // more frames = slower
    const frameDuration = 80;  // ms per frame — slower tick
    const interval = setInterval(() => {
      frame++;

      if (frame < totalFrames * 0.5) {
        // Pure chaos — all scrambled
        let scrambled = "";
        for (let i = 0; i < finalText.length; i++) {
          if (finalText[i] === " ") { scrambled += " "; continue; }
          scrambled += japaneseChars[Math.floor(Math.random() * japaneseChars.length)];
        }
        tagline.textContent = scrambled;
        tagline.style.color = frame % 2 === 0 ? "#ff2c2c" : "#a855f7";
        tagline.style.textShadow = "2px 0 #ff2c2c, -2px 0 #a855f7, 0 0 16px #ff69b4";
        tagline.style.letterSpacing = (Math.random() * 3) + "px";
        tagline.style.fontFamily = "monospace";

      } else if (frame < totalFrames * 0.85) {
        // Gradual resolve — more correct chars each frame
        const progress = (frame - totalFrames * 0.5) / (totalFrames * 0.35);
        let result = "";
        for (let i = 0; i < finalText.length; i++) {
          if (finalText[i] === " ") { result += " "; continue; }
          // Each character resolves individually based on its index + progress
          const charProgress = Math.max(0, progress * 1.4 - (i / finalText.length) * 0.4);
          result += Math.random() < charProgress
            ? finalText[i]
            : japaneseChars[Math.floor(Math.random() * japaneseChars.length)];
        }
        tagline.textContent = result;
        const alpha = 0.7 + progress * 0.3;
        tagline.style.color = `rgba(255,255,255,${alpha})`;
        tagline.style.textShadow = `0 0 ${12 - progress*10}px rgba(255,44,44,0.6), 0 0 24px rgba(168,85,247,0.3)`;
        tagline.style.letterSpacing = "";
        tagline.style.fontFamily = "";

      } else {
        // Locked — show final text clearly
        clearInterval(interval);
        tagline.textContent = finalText;
        tagline.style.color = "#fff";
        tagline.style.textShadow = "0 0 20px rgba(255,44,44,0.3)";
        tagline.style.letterSpacing = "0.5px";
        tagline.style.fontFamily = "";
        tagline.style.fontWeight = "800";
        tagline.style.transition = "text-shadow 1s ease";
        // Glow fades to nothing — clean final state
        setTimeout(() => { tagline.style.textShadow = ""; }, 800);
      }
    }, frameDuration);
  }

  // ── Language swap step ────────────────────────────────────────────────
  function swap(text, color, fontStyle, then, holdMs) {
    tagline.style.transition = "opacity 0.25s ease, transform 0.25s ease";
    tagline.style.opacity = "0";
    tagline.style.transform = "translateY(-6px)";
    setTimeout(() => {
      tagline.textContent = text;
      tagline.style.color = color;
      tagline.style.fontFamily = fontStyle || "";
      tagline.style.letterSpacing = fontStyle ? "3px" : "";
      tagline.style.opacity = "1";
      tagline.style.transform = "translateY(0)";
      if (then) setTimeout(then, holdMs || 600);
    }, 250);
  }

  // ── Full sequence ─────────────────────────────────────────────────────
  // Start 400ms in — splash is just appearing
  setTimeout(() => {

    // 1. Japanese full phrase — holds 650ms
    swap("映画とアニメを見る", "rgba(255,44,44,0.9)", "'Georgia',serif", () => {

      // 2. Shorter Japanese — holds 650ms
      swap("アニメを見る", "rgba(255,180,50,0.95)", "'Georgia',serif", () => {

        // 3. Glitch into final English
        tagline.style.fontFamily = "monospace";
        tagline.style.transition = "none";
        tagline.style.letterSpacing = "";
        glitchReveal();

      }, 650); // hold "アニメを見る" for 650ms
    }, 650);   // hold "映画とアニメを見る" for 650ms

  }, 400);

})();
</script>
